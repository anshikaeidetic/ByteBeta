apiVersion: apps/v1
kind: Deployment
metadata:
  name: byteai-operator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: byteai-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: byteai-operator
    spec:
      serviceAccountName: byteai-operator
      containers:
        - name: operator
          image: byteai-cache-operator:latest
          imagePullPolicy: IfNotPresent
          args: []
