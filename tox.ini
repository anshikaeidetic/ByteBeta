[tox]
envlist = py310,py311,py312,hygiene,lint,typecheck,maintainability,package,compile,security,coverage,integration-smoke
isolated_build = true
skip_missing_interpreters = true

[testenv]
extras = dev,test,observability,server,benchmark
setenv =
    PYTHONDONTWRITEBYTECODE = 1
    PIP_CONSTRAINT = requirements/dev-ci.txt
commands =
    python scripts/run_unit_tests.py

[testenv:hygiene]
extras = dev
commands =
    python scripts/check_repo_hygiene.py
    python scripts/check_locks.py

[testenv:lint]
extras = dev,test,observability,server,benchmark
commands =
    python scripts/run_lint.py

[testenv:typecheck]
extras = dev,test,observability,server,benchmark
commands =
    python scripts/run_typecheck.py

[testenv:maintainability]
extras = dev,test,observability,server,benchmark
commands =
    python scripts/check_maintainability_contract.py

[testenv:package]
extras = dev,test,observability,server,benchmark
commands =
    python -m build --no-isolation --sdist --wheel
    python -m twine check dist/*

[testenv:compile]
extras = dev,test,observability,server,benchmark
commands =
    python scripts/compile_check.py

[testenv:security]
extras = dev,test,security,observability,server,benchmark
setenv =
    PYTHONDONTWRITEBYTECODE = 1
    PIP_CONSTRAINT = requirements/security-ci.txt
commands =
    python scripts/run_security_checks.py

[testenv:coverage]
extras = dev,test,observability,server,benchmark
commands =
    python scripts/run_coverage.py

[testenv:integration-smoke]
extras = dev,test,observability,server,benchmark
commands =
    python scripts/run_integration_smoke.py
