[mypy]
python_version = 3.10
warn_unused_configs = False
check_untyped_defs = True
warn_unused_ignores = True
warn_return_any = True
no_implicit_optional = True

[mypy-anthropic.*]
ignore_missing_imports = True

[mypy-boto3.*]
ignore_missing_imports = True

[mypy-faiss.*]
ignore_missing_imports = True

