name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  bootstrap-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Bootstrap POSIX
        if: runner.os != 'Windows'
        run: bash ./bootstrap-dev.sh --skip-pre-commit

      - name: Bootstrap Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\bootstrap-dev.ps1 --skip-pre-commit

      - name: Validate developer experience contract
        run: python scripts/check_devx_contract.py

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,observability,server]"

      - name: Run hygiene
        run: python scripts/check_repo_hygiene.py

      - name: Verify lockfiles
        run: python scripts/check_locks.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,observability,server]"

      - name: Run lint
        run: python scripts/run_lint.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,observability,server]"

      - name: Run typecheck
        run: python scripts/run_typecheck.py

  maintainability:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,observability,server]"

      - name: Run maintainability contract
        run: python scripts/check_maintainability_contract.py

  annotation-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Run return annotation contract
        run: python scripts/check_annotation_contract.py

  benchmark-claim-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Run benchmark claim contract
        run: python scripts/check_benchmark_claims.py

  trust-calibration-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Run trust calibration contract
        run: python scripts/check_trust_calibration.py

  dependency-compatibility:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Run dependency policy contract
        run: python scripts/check_dependency_policy.py

  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,observability,server]"

      - name: Validate package build
        run: |
          python -m build --no-isolation --sdist --wheel
          python scripts/check_package_artifacts.py
          python scripts/check_install_parity.py
          python -m twine check dist/*

  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,observability,server]"

      - name: Run compile validation
        run: python scripts/compile_check.py

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/security-ci.txt -e ".[dev,security,observability,server]"
          python -m pip install semgrep==1.157.0

      - name: Run security validation
        run: python scripts/run_security_checks.py

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,test,onnx,faiss,observability,server]"
          python -m pip install -c requirements/dev-ci.txt redis

      - name: Run coverage
        run: python scripts/run_coverage.py

  integration-smoke:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis/redis-stack-server:latest
        ports:
          - 6379:6379
    env:
      BYTE_RUN_LIVE_INTEGRATION: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,test,onnx,observability,server]"

      - name: Run integration smoke checks
        run: python scripts/run_integration_smoke.py

  unit-base-py310:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,observability,server]"

      - name: Run unit tests
        run: python scripts/run_unit_tests.py

  unit-base-py311:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,observability,server]"

      - name: Run unit tests
        run: python scripts/run_unit_tests.py

  unit-base-py312:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,observability,server]"

      - name: Run unit tests
        run: python scripts/run_unit_tests.py

  unit-openai:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,openai,onnx,sql,faiss,observability,server]"
          python -m pip install -c requirements/dev-ci.txt pillow

      - name: Run OpenAI feature tests
        run: python scripts/run_optional_feature_tests.py openai pillow

  unit-groq:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,groq,onnx,sql,faiss,observability,server]"

      - name: Run Groq feature tests
        run: python scripts/run_optional_feature_tests.py groq

  unit-sqlalchemy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,sql,observability,server]"

      - name: Run SQLAlchemy feature tests
        run: python scripts/run_optional_feature_tests.py sqlalchemy

  unit-transformers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,huggingface,observability,server]"

      - name: Run transformers feature tests
        run: python scripts/run_optional_feature_tests.py transformers

  unit-langchain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,langchain,onnx,sql,faiss,observability,server]"

      - name: Run LangChain feature tests
        run: python scripts/run_optional_feature_tests.py langchain

  unit-semantic-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,onnx,sql,faiss,observability,server]"

      - name: Run semantic cache feature tests
        run: python scripts/run_optional_feature_tests.py onnx sqlalchemy faiss

  benchmark-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/dev-ci.txt -e ".[dev,observability,server]"

      - name: Run benchmark regression tests
        run: |
          python -m pytest -p no:cacheprovider tests/unit_tests/benchmarking tests/unit_tests/adapter/test_deepseek_runtime_benchmark_plan.py tests/unit_tests/adapter/test_deepseek_reasoning_reuse_benchmark_plan.py tests/unit_tests/adapter/test_mixed_benchmark_100_plan.py tests/unit_tests/adapter/test_mixed_benchmark_plan.py

  unit-tests:
    runs-on: ubuntu-latest
    needs:
      - annotation-contract
      - benchmark-claim-contract
      - dependency-compatibility
      - unit-base-py310
      - unit-base-py311
      - unit-base-py312
      - unit-openai
      - unit-groq
      - unit-sqlalchemy
      - unit-transformers
      - unit-langchain
      - unit-semantic-cache
      - benchmark-regression
      - maintainability
      - trust-calibration-contract
    steps:
      - name: Unit test matrix passed
        run: echo "Base and optional feature unit test lanes passed."
